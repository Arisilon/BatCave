schema: 3
project:
  name: batcave
  version_service:
    type: bumpver
test:
  steps:
    - type: flake8
    - type: pylint
    - type: mypy
    - type: python_unittest
build:
  steps:
    - type: setuptools
    # - type: sphinx
release:
  steps:
    - type: pypi
      test_pypi: true
      username: __token__
      password: "{var:PYPI_TOKEN}"
      pre_release_only: true
    - type: increment_release
    - type: setuptools_build
      release_only: true
    - type: github
      release_only: true
    - type: increment_release
      release_only: true
      args:
        patch: True
        tag: rc
        tag-num: True
    - type: pypi
      username: __token__
      password: "{var:PYPI_TOKEN}"
      release_only: true
